<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tambah Barang Baru - WarungPOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container": "#e9efe9",
                      "primary": "#006948",
                      "on-primary-container": "#f5fff7",
                      "error-container": "#ffdad6",
                      "surface-container-highest": "#dee4de",
                      "on-tertiary-container": "#fffbff",
                      "on-primary-fixed": "#002114",
                      "error": "#ba1a1a",
                      "on-tertiary-fixed": "#410004",
                      "surface-dim": "#d5dcd6",
                      "on-surface": "#171d19",
                      "surface-container-high": "#e4eae4",
                      "secondary-container": "#d6e0f4",
                      "primary-fixed": "#85f8c4",
                      "surface-container-lowest": "#ffffff",
                      "secondary-fixed-dim": "#bdc7db",
                      "inverse-surface": "#2c322e",
                      "primary-fixed-dim": "#68dba9",
                      "tertiary-fixed-dim": "#ffb3ae",
                      "tertiary-container": "#ba5551",
                      "surface-variant": "#dee4de",
                      "on-error-container": "#93000a",
                      "on-secondary-container": "#596374",
                      "on-primary-fixed-variant": "#005137",
                      "on-secondary": "#ffffff",
                      "on-tertiary-fixed-variant": "#7f2928",
                      "tertiary-fixed": "#ffdad7",
                      "on-tertiary": "#ffffff",
                      "on-surface-variant": "#3d4a42",
                      "surface-tint": "#006c4a",
                      "inverse-on-surface": "#ecf2ec",
                      "secondary": "#555f70",
                      "on-background": "#171d19",
                      "on-secondary-fixed": "#121c2a",
                      "on-primary": "#ffffff",
                      "on-error": "#ffffff",
                      "surface-bright": "#f5fbf5",
                      "surface": "#f5fbf5",
                      "surface-container-low": "#eff5ef",
                      "on-secondary-fixed-variant": "#3d4757",
                      "tertiary": "#9b3e3b",
                      "secondary-fixed": "#d9e3f7",
                      "primary-container": "#00855d",
                      "background": "#f5fbf5",
                      "outline-variant": "#bccac0",
                      "outline": "#6d7a72",
                      "inverse-primary": "#68dba9"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "unit": "8px",
                      "gutter": "24px",
                      "sidebar-width": "260px",
                      "margin-page": "32px",
                      "container-max": "1440px"
              },
              "fontFamily": {
                      "headline-md": [
                              "Inter"
                      ],
                      "label-uppercase": [
                              "Inter"
                      ],
                      "body-sm": [
                              "Inter"
                      ],
                      "display-sm": [
                              "Inter"
                      ],
                      "body-base": [
                              "Inter"
                      ]
              },
              "fontSize": {
                      "headline-md": [
                              "18px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "600"
                              }
                      ],
                      "label-uppercase": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "700"
                              }
                      ],
                      "body-sm": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "400"
                              }
                      ],
                      "display-sm": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "600"
                              }
                      ],
                      "body-base": [
                              "16px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      }
              }
      },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-dim font-body-base text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay -->
<div aria-hidden="true" class="fixed inset-0 bg-on-surface/40 backdrop-blur-sm z-40"></div>
<!-- Modal Container -->
<div class="relative z-50 w-full max-w-2xl bg-surface-container-lowest rounded-xl shadow-[0_10px_15px_rgba(0,0,0,0.1)] flex flex-col max-h-[921px]">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-4 border-b border-surface-variant">
<h2 class="font-headline-md text-headline-md text-on-surface">Tambah Barang Baru</h2>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-on-surface p-1 rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[24px]" data-icon="close">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto p-6 space-y-6">
<!-- Image Upload Area -->
<div>
<label class="block font-label-uppercase text-label-uppercase text-on-surface-variant mb-2">Foto Produk</label>
<div class="border-2 border-dashed border-outline-variant rounded-lg p-8 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-surface-container-low hover:border-primary transition-colors group bg-surface">
<div class="w-12 h-12 bg-primary-container/10 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-[28px]" data-icon="add_photo_alternate">add_photo_alternate</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-1"><span class="text-primary font-medium">Klik untuk upload</span> atau drag and drop</p>
<p class="font-body-sm text-[12px] text-outline">PNG, JPG up to 5MB</p>
</div>
</div>
<!-- Form Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
<!-- Nama Produk (Full Width) -->
<div class="col-span-1 md:col-span-2">
<label class="block font-label-uppercase text-label-uppercase text-on-surface-variant mb-1.5" for="product_name">Nama Produk</label>
<input class="w-full h-10 px-3 border border-outline-variant rounded bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary font-body-sm text-body-sm text-on-surface transition-colors" id="product_name" placeholder="Masukkan nama produk" type="text"/>
</div>
<!-- Kode Barcode -->
<div class="col-span-1 md:col-span-2">
<label class="block font-label-uppercase text-label-uppercase text-on-surface-variant mb-1.5" for="barcode">Kode Barcode</label>
<div class="relative">
<input class="w-full h-10 pl-3 pr-10 border border-outline-variant rounded bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary font-body-sm text-body-sm text-on-surface transition-colors" id="barcode" placeholder="Scan atau ketik barcode" type="text"/>
<button class="absolute inset-y-0 right-0 flex items-center px-3 text-[#059669] hover:text-[#047857] transition-colors" title="Scan via kamera">
<span class="material-symbols-outlined text-[24px]">barcode_scanner</span>
</button>
</div>
<p class="mt-1 font-body-sm text-[12px] text-outline">Gunakan scanner barcode atau klik ikon untuk scan via kamera</p>
</div>
<!-- SKU -->
<div>
<label class="block font-label-uppercase text-label-uppercase text-on-surface-variant mb-1.5" for="sku">SKU</label>
<input class="w-full h-10 px-3 border border-outline-variant rounded bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary font-body-sm text-body-sm text-on-surface transition-colors" id="sku" type="text" value="SKU-10045"/>
</div>
<!-- Kategori -->
<div>
<label class="block font-label-uppercase text-label-uppercase text-on-surface-variant mb-1.5" for="category">Kategori</label>
<div class="relative">
<select class="w-full h-10 px-3 border border-outline-variant rounded bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary font-body-sm text-body-sm text-on-surface appearance-none transition-colors" id="category">
<option value="">Pilih Kategori</option>
<option value="makanan">Makanan</option>
<option value="minuman">Minuman</option>
<option value="sembako">Sembako</option>
<option value="pembersih">Pembersih</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Harga Beli -->
<div>
<label class="block font-label-uppercase text-label-uppercase text-on-surface-variant mb-1.5" for="buy_price">Harga Beli</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
<span class="font-body-sm text-body-sm text-on-surface-variant">Rp</span>
</div>
<input class="w-full h-10 pl-10 pr-3 border border-outline-variant rounded bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary font-body-sm text-body-sm text-on-surface transition-colors" id="buy_price" placeholder="0" type="number"/>
</div>
</div>
<!-- Harga Eceran -->
<div>
<label class="block font-label-uppercase text-label-uppercase text-on-surface-variant mb-1.5" for="sell_price_retail">Harga Eceran (Retail)</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
<span class="font-body-sm text-body-sm text-on-surface-variant">Rp</span>
</div>
<input class="w-full h-10 pl-10 pr-3 border border-outline-variant rounded bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-[#059669] focus:border-[#059669] border-[#059669]/50 font-body-sm text-body-sm text-on-surface transition-colors" id="sell_price_retail" placeholder="0" type="number"/>
</div>
</div>
<!-- Harga Partai -->
<div>
<label class="block font-label-uppercase text-label-uppercase text-on-surface-variant mb-1.5" for="sell_price_wholesale">Harga Partai (Wholesale)</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
<span class="font-body-sm text-body-sm text-on-surface-variant">Rp</span>
</div>
<input class="w-full h-10 pl-10 pr-3 border border-outline-variant rounded bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary font-body-sm text-body-sm text-on-surface transition-colors" id="sell_price_wholesale" placeholder="0" type="number"/>
</div>
</div>
<!-- Min Pembelian Partai -->
<div>
<label class="block font-label-uppercase text-label-uppercase text-on-surface-variant mb-1.5" for="min_wholesale">Stock Awal</label>
<input class="w-full h-10 px-3 border border-outline-variant rounded bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary font-body-sm text-body-sm text-on-surface transition-colors" id="min_wholesale" placeholder="0" type="number"/>
</div>
<!-- Stok Awal -->
</div>
</div>
<!-- Footer -->
<div class="flex items-center justify-end px-6 py-4 border-t border-surface-variant bg-surface-container-lowest rounded-b-xl gap-3">
<button class="px-4 h-10 border border-outline-variant rounded text-on-surface hover:bg-surface-container-low transition-colors font-body-sm text-body-sm font-medium">
                Batal
            </button>
<button class="px-4 h-10 bg-[#059669] text-white rounded hover:bg-[#047857] transition-colors font-body-sm text-body-sm font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="check" data-weight="fill" style='font-variation-settings: "FILL" 1;'>check</span>
                Simpan Produk
            </button>
</div>
</div>
</body></html>
