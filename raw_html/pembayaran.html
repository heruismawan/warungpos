<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Modal - WarungPOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#ffb3ae",
                        "on-error-container": "#93000a",
                        "surface-variant": "#dee4de",
                        "on-secondary-container": "#596374",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#3d4a42",
                        "primary-container": "#00855d",
                        "secondary-container": "#d6e0f4",
                        "on-tertiary-container": "#fffbff",
                        "primary-fixed": "#85f8c4",
                        "surface-container-highest": "#dee4de",
                        "on-error": "#ffffff",
                        "surface-container-low": "#eff5ef",
                        "surface": "#f5fbf5",
                        "on-primary-container": "#f5fff7",
                        "inverse-surface": "#2c322e",
                        "secondary-fixed-dim": "#bdc7db",
                        "background": "#f5fbf5",
                        "surface-dim": "#d5dcd6",
                        "surface-bright": "#f5fbf5",
                        "inverse-primary": "#68dba9",
                        "on-surface": "#171d19",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdad7",
                        "on-tertiary-fixed-variant": "#7f2928",
                        "surface-container": "#e9efe9",
                        "primary": "#006948",
                        "outline": "#6d7a72",
                        "on-background": "#171d19",
                        "secondary": "#555f70",
                        "on-primary-fixed-variant": "#005137",
                        "surface-tint": "#006c4a",
                        "surface-container-high": "#e4eae4",
                        "on-secondary-fixed-variant": "#3d4757",
                        "tertiary": "#9b3e3b",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#002114",
                        "on-secondary-fixed": "#121c2a",
                        "primary-fixed-dim": "#68dba9",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#d9e3f7",
                        "outline-variant": "#bccac0",
                        "tertiary-container": "#ba5551",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#410004",
                        "inverse-on-surface": "#ecf2ec"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "margin-page": "32px",
                        "gutter": "24px",
                        "container-max": "1440px",
                        "sidebar-width": "260px"
                    },
                    "fontFamily": {
                        "label-uppercase": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-base": ["Inter"],
                        "display-sm": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "label-uppercase": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-md": ["18px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-sm": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-base h-screen w-screen flex items-center justify-center overflow-hidden">
<!-- Overlay Background (simulating active POS behind it) -->
<div class="absolute inset-0 bg-inverse-surface/40 backdrop-blur-sm z-40"></div>
<!-- Modal Container -->
<div class="relative z-50 bg-surface rounded-xl shadow-[0_10px_15px_rgba(0,0,0,0.1)] w-full max-w-2xl flex flex-col max-h-[921px] overflow-hidden">
<!-- Header -->
<div class="px-gutter pt-gutter pb-4 border-b border-surface-variant flex justify-between items-start bg-surface-container-lowest rounded-t-xl">
<div>
<p class="font-label-uppercase text-label-uppercase text-outline uppercase">Total Tagihan</p>
<h1 class="font-display-sm text-display-sm text-primary mt-1">Rp 150.000</h1>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Payment Tabs -->
<div class="flex border-b border-surface-variant bg-surface-container-lowest px-gutter">
<button class="flex-1 py-4 text-center border-b-2 border-primary font-headline-md text-headline-md text-primary bg-surface-container-low transition-colors">
<span class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
                    Tunai
                </span>
</button>
<button class="flex-1 py-4 text-center border-b-2 border-transparent font-headline-md text-headline-md text-on-surface-variant hover:text-primary hover:bg-surface-container transition-colors">
<span class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
                    E-Wallet (QRIS)
                </span>
</button>
<button class="flex-1 py-4 text-center border-b-2 border-transparent font-headline-md text-headline-md text-on-surface-variant hover:text-primary hover:bg-surface-container transition-colors">
<span class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="account_balance">account_balance</span>
                    Transfer Bank
                </span>
</button>
</div>
<!-- Modal Body (Cash Tab Active) -->
<div class="p-gutter flex gap-gutter overflow-y-auto bg-surface-container-lowest">
<!-- Left Side: Input & Change -->
<div class="flex-1 flex flex-col gap-6">
<!-- Input Field -->
<div>
<label class="block font-body-sm text-body-sm text-on-surface-variant mb-2">Uang Diterima</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-headline-md text-headline-md text-on-surface-variant">Rp</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface border border-outline-variant rounded-lg font-headline-md text-headline-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" readonly="" type="text" value="200.000"/>
</div>
</div>
<!-- Quick Cash Buttons -->
<div class="grid grid-cols-2 gap-3">
<button class="py-3 px-4 rounded-lg border border-outline-variant font-body-base text-body-base text-on-surface hover:bg-surface-container hover:border-primary transition-colors text-center">Rp 20.000</button>
<button class="py-3 px-4 rounded-lg border border-outline-variant font-body-base text-body-base text-on-surface hover:bg-surface-container hover:border-primary transition-colors text-center">Rp 50.000</button>
<button class="py-3 px-4 rounded-lg border border-outline-variant font-body-base text-body-base text-on-surface hover:bg-surface-container hover:border-primary transition-colors text-center">Rp 100.000</button>
<button class="py-3 px-4 rounded-lg border border-primary bg-primary-container/10 font-body-base text-body-base text-primary font-medium transition-colors text-center">Rp 200.000</button>
</div>
<!-- Change Display -->
<div class="mt-auto p-4 rounded-lg bg-surface-container flex justify-between items-center">
<span class="font-body-base text-body-base text-on-surface-variant">Kembalian</span>
<span class="font-display-sm text-display-sm text-on-surface">Rp 50.000</span>
</div>
</div>
<!-- Right Side: Numpad -->
<div class="w-64 grid grid-cols-3 gap-2 shrink-0">
<button class="h-14 rounded-lg bg-surface-container hover:bg-surface-container-high font-headline-md text-headline-md text-on-surface transition-colors">1</button>
<button class="h-14 rounded-lg bg-surface-container hover:bg-surface-container-high font-headline-md text-headline-md text-on-surface transition-colors">2</button>
<button class="h-14 rounded-lg bg-surface-container hover:bg-surface-container-high font-headline-md text-headline-md text-on-surface transition-colors">3</button>
<button class="h-14 rounded-lg bg-surface-container hover:bg-surface-container-high font-headline-md text-headline-md text-on-surface transition-colors">4</button>
<button class="h-14 rounded-lg bg-surface-container hover:bg-surface-container-high font-headline-md text-headline-md text-on-surface transition-colors">5</button>
<button class="h-14 rounded-lg bg-surface-container hover:bg-surface-container-high font-headline-md text-headline-md text-on-surface transition-colors">6</button>
<button class="h-14 rounded-lg bg-surface-container hover:bg-surface-container-high font-headline-md text-headline-md text-on-surface transition-colors">7</button>
<button class="h-14 rounded-lg bg-surface-container hover:bg-surface-container-high font-headline-md text-headline-md text-on-surface transition-colors">8</button>
<button class="h-14 rounded-lg bg-surface-container hover:bg-surface-container-high font-headline-md text-headline-md text-on-surface transition-colors">9</button>
<button class="h-14 rounded-lg bg-surface-container hover:bg-surface-container-high font-headline-md text-headline-md text-on-surface transition-colors font-bold text-lg">00</button>
<button class="h-14 rounded-lg bg-surface-container hover:bg-surface-container-high font-headline-md text-headline-md text-on-surface transition-colors">0</button>
<button class="h-14 rounded-lg bg-surface-container hover:bg-error-container hover:text-on-error-container text-on-surface transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</div>
</div>
<!-- Footer -->
<div class="px-gutter py-4 border-t border-surface-variant flex gap-4 bg-surface-container-lowest rounded-b-xl">
<button class="px-6 py-3 rounded-lg border border-outline font-headline-md text-headline-md text-on-surface-variant hover:bg-surface-container transition-colors">
                Batal
            </button>
<button class="flex-1 py-3 rounded-lg bg-primary font-headline-md text-headline-md text-on-primary hover:bg-surface-tint transition-colors shadow-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                Konfirmasi Pembayaran
            </button>
</div>
</div>
</body></html>
